services:
  tendermanager_database:
    image: postgres
    volumes:
      - pgdata:/var/lib/postgresql/
    ports:
      - "5432:5432" 
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  tendermanager_app:
    build: .
    image: tendermanager_app
    ports:
      - "8000:8000"
    depends_on:
      tendermanager_database:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  tendermanager_frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      tendermanager_app:
        condition: service_healthy

  tendermanager_playwright:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      - BASE_URL=http://tendermanager_frontend
    depends_on:
      tendermanager_frontend:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - test

volumes:
  pgdata: