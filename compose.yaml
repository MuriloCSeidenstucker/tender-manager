services:
  tendermanager_database:
    image: postgres
    volumes:
      - pgdata:/var/lib/postgresql/
    ports:
      - "5432:5432" 
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  tendermanager_app:
    build: .
    image: tendermanager_app
    ports:
      - "8000:8000"
    depends_on:
      tendermanager_database:
        condition: service_healthy
    env_file:
      - .env

volumes:
  pgdata: