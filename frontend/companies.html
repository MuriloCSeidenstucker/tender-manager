<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empresas — Tender Manager</title>
  <meta name="description" content="Gerencie suas empresas no Tender Manager." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">📋</span>
        <div>
          <h2>Tender Manager</h2>
          <span>MVP v1.0</span>
        </div>
      </div>

      <p class="nav-label">Menu</p>

      <a href="./dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="./companies.html" class="nav-item active">
        <span class="nav-icon">🏢</span> Empresas
      </a>
      <a href="./tenders.html" class="nav-item">
        <span class="nav-icon">📄</span> Licitações
      </a>

      <div class="sidebar-spacer"></div>

      <a href="./profile.html" class="nav-item">
        <span class="nav-icon">👤</span> Meu Perfil
      </a>

      <div class="sidebar-user">
        <div class="user-avatar" id="user-initial">U</div>
        <div class="user-info">
          <div class="user-name" id="username-display">Carregando...</div>
          <div class="user-email">Analista</div>
        </div>
        <button id="logout-btn" class="btn-logout" title="Sair">⏏</button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main-content">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1>Empresas</h1>
            <p>Gerencie as empresas vinculadas à sua conta.</p>
          </div>
          <button id="btn-new-company" class="btn-primary btn-inline">
            <span>＋</span> Nova Empresa
          </button>
        </div>
      </div>

      <div id="companies-list">
        <div class="loading-state">
          <span class="spinner" style="width:28px;height:28px;border-width:3px"></span>
          <span>Carregando empresas...</span>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Modal: Criar / Editar Empresa ── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">Nova Empresa</h2>
        <button id="modal-close" class="btn-modal-close" aria-label="Fechar">✕</button>
      </div>

      <form id="company-form" novalidate>
        <input type="hidden" id="company-id" />

        <div class="form-group">
          <label for="company-name">Razão Social</label>
          <input id="company-name" type="text" placeholder="Ex.: Empresa Ltda." maxlength="150" required />
        </div>

        <div class="form-group">
          <label for="company-trade-name">Nome Fantasia</label>
          <input id="company-trade-name" type="text" placeholder="Ex.: Empresa" maxlength="150" required />
        </div>

        <div class="form-group">
          <label for="company-cnpj">CNPJ <span class="label-hint">(apenas números)</span></label>
          <input id="company-cnpj" type="text" placeholder="00000000000000" maxlength="14" required />
        </div>

        <p id="form-error" class="error-msg hidden"></p>

        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
          <button type="submit" id="btn-save" class="btn-primary btn-inline">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Modal: Confirmar Exclusão ── -->
  <div id="delete-overlay" class="modal-overlay hidden">
    <div class="modal-card modal-card-sm" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>Excluir Empresa</h2>
        <button id="delete-modal-close" class="btn-modal-close">✕</button>
      </div>
      <p class="confirm-text">Tem certeza que deseja excluir <strong id="delete-company-name"></strong>? Esta ação não pode ser desfeita.</p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn-secondary">Cancelar</button>
        <button id="btn-confirm-delete" class="btn-danger">Excluir</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/companies.js"></script>
</body>
</html>
