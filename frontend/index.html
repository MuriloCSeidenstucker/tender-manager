<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tender Manager — Acesso</title>
  <meta name="description" content="Acesse ou crie sua conta no Tender Manager para gerenciar licitações." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">📋</span>
      <h1>Tender Manager</h1>
      <p>Gestão inteligente de licitações</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist">
      <button id="tab-login"    class="auth-tab active" role="tab" aria-selected="true"  aria-controls="panel-login">Entrar</button>
      <button id="tab-register" class="auth-tab"        role="tab" aria-selected="false" aria-controls="panel-register">Criar conta</button>
    </div>

    <!-- ── Login Form ── -->
    <div id="panel-login" role="tabpanel">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com"
            autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="login-password">Senha</label>
          <input id="login-password" type="password" placeholder="••••••••"
            autocomplete="current-password" required />
        </div>

        <button id="login-submit-btn" type="submit" class="btn-primary">Entrar</button>
        <p id="login-error" class="error-msg hidden"></p>
      </form>
    </div>

    <!-- ── Register Form ── -->
    <div id="panel-register" role="tabpanel" class="hidden">
      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="reg-username">Nome de usuário</label>
          <input id="reg-username" type="text" placeholder="seunome"
            minlength="3" maxlength="50" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input id="reg-email" type="email" placeholder="seu@email.com"
            autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="reg-password">Senha <span style="font-weight:400;color:var(--text-muted);font-size:0.8rem;">(mínimo 6 caracteres)</span></label>
          <input id="reg-password" type="password" placeholder="••••••••"
            minlength="6" maxlength="128" autocomplete="new-password" required />
        </div>

        <button id="register-submit-btn" type="submit" class="btn-primary">Criar conta</button>
        <p id="register-error"   class="error-msg hidden"></p>
        <p id="register-success" class="success-msg hidden">Conta criada! Fazendo login...</p>
      </form>
    </div>
  </div>

  <script type="module" src="./js/login.js"></script>
</body>
</html>
