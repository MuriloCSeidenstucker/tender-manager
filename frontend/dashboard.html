<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Tender Manager</title>
  <meta name="description" content="Painel de controle de licitações por empresa." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">📋</span>
        <div>
          <h2>Tender Manager</h2>
          <span>MVP v1.0</span>
        </div>
      </div>

      <p class="nav-label">Menu</p>

      <a href="./dashboard.html" class="nav-item active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="./companies.html" class="nav-item">
        <span class="nav-icon">🏢</span> Empresas
      </a>
      <a href="./tenders.html" class="nav-item">
        <span class="nav-icon">📄</span> Licitações
      </a>

      <div class="sidebar-spacer"></div>

      <div class="sidebar-user">
        <div class="user-avatar" id="user-initial">U</div>
        <div class="user-info">
          <div class="user-name" id="username-display">Carregando...</div>
          <div class="user-email">Analista</div>
        </div>
        <button id="logout-btn" class="btn-logout" title="Sair">⏏</button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p>Resultados consolidados por empresa no ano selecionado.</p>

        <div class="year-selector">
          <label for="year-select">Ano de referência:</label>
          <select id="year-select"></select>
        </div>
      </div>

      <div class="companies-grid" id="companies-container">
        <div class="loading-state">
          <span class="spinner" style="width:28px;height:28px;border-width:3px"></span>
          <span>Carregando dados...</span>
        </div>
      </div>
    </main>

  </div>

  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
